spring:
    application:
        name: checkout-lab
    datasource:
        url: jdbc:postgresql://postgres:5432/${POSTGRES_DB_NAME}
        username: ${POSTGRES_USER}
        password: ${POSTGRES_PASSWORD}
    jpa:
        hibernate:
            ddl-auto: update
        properties:
            hibernate:
                dialect: org.hibernate.dialect.PostgreSQLDialect
